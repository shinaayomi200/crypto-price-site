<!DOCTYPE html>
<html>
<head>
  <title>Crypto Tracker</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    h2 {
      color: #38bdf8;
    }

    input {
      padding: 12px;
      width: 200px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .green {
      color: #22c55e;
    }

    .red {
      color: #ef4444;
    }
  </style>
</head>

<body>

<h2>🚀 Crypto Price Tracker</h2>

<input type="text" id="coin" placeholder="BTC, ETH, SOL...">
<button onclick="getPrice()">Check Price</button>

<p id="result"></p>

<script>
let lastPrice = null;

// Map symbols → CoinGecko IDs
const coinMap = {
  btc: "bitcoin",
  eth: "ethereum",
  sol: "solana",
  bnb: "binancecoin",
  ada: "cardano",
  doge: "dogecoin"
};

async function getPrice() {
  const input = document.getElementById("coin").value.toLowerCase();

  // Convert symbol to full name
  const coin = coinMap[input] || input;

  const result = document.getElementById("result");
  result.innerText = "⏳ Fetching price...";

  try {
    const url = `https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd`;

    const res = await fetch(url);
    const data = await res.json();

    if (!data[coin]) {
      result.innerText = "❌ Coin not found";
      return;
    }

    const price = data[coin].usd;
    const formattedPrice = price.toLocaleString();

    // Check price change
    let colorClass = "";
    if (lastPrice !== null) {
      if (price > lastPrice) colorClass = "green";
      else if (price < lastPrice) colorClass = "red";
    }

    lastPrice = price;

    result.innerHTML = `
      ${coin.toUpperCase()} = $${formattedPrice}
    `;
    result.className = colorClass;

  } catch (error) {
    result.innerText = "⚠️ Error fetching data";
  }
}

// Auto refresh every 10 seconds
setInterval(getPrice, 10000);
</script>

</body>
</html>
