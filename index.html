<!DOCTYPE html>
<html>
<head>
  <title>Crypto Tracker</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    h2 {
      color: #38bdf8;
    }

    input {
      padding: 12px;
      width: 200px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      color: #facc15;
    }
  </style>

</head>
<body>

<h2>🚀 Crypto Price Tracker</h2>

<input type="text" id="coin" placeholder="bitcoin, ethereum...">
<button onclick="getPrice()">Check Price</button>

<p id="result"></p>

<script>
async function getPrice() {
  const coin = document.getElementById("coin").value.toLowerCase();

  try {
    const url = `https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd`;

    const res = await fetch(url);
    const data = await res.json();

    if (!data[coin]) {
      document.getElementById("result").innerText = "❌ Coin not found";
      return;
    }

    document.getElementById("result").innerText =
      coin.toUpperCase() + " = $" + data[coin].usd;

  } catch (error) {
    document.getElementById("result").innerText = "⚠️ Error fetching data";
  }
}
</script>

</body>
</html>
