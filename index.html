<!DOCTYPE html>
<html>
<head>
  <title>Crypto Tracker (Live)</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    h2 {
      color: #38bdf8;
    }

    input {
      padding: 12px;
      width: 200px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .green {
      color: #22c55e;
    }

    .red {
      color: #ef4444;
    }
  </style>
</head>

<body>

<h2>🚀 Live Crypto Price Tracker</h2>

<input type="text" id="coin" placeholder="BTC, ETH, SOL...">
<button onclick="startTracking()">Start Tracking</button>

<p id="result">Enter a coin to begin</p>

<script>
let interval;
let lastPrice = null;

// Symbol → Binance format
const coinMap = {
  btc: "BTCUSDT",
  eth: "ETHUSDT",
  sol: "SOLUSDT",
  bnb: "BNBUSDT",
  ada: "ADAUSDT",
  doge: "DOGEUSDT"
};

function startTracking() {
  const input = document.getElementById("coin").value.toLowerCase();
  const symbol = coinMap[input];
  const result = document.getElementById("result");

  if (!symbol) {
    result.innerText = "❌ Unsupported coin (try BTC, ETH, SOL)";
    return;
  }

  // Stop previous tracking
  if (interval) clearInterval(interval);

  result.innerText = "⏳ Fetching live price...";

  async function fetchPrice() {
    try {
      const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
      const data = await res.json();

      const price = parseFloat(data.price);
      const formatted = price.toLocaleString();

      // Color logic
      let colorClass = "";
      if (lastPrice !== null) {
        if (price > lastPrice) colorClass = "green";
        else if (price < lastPrice) colorClass = "red";
      }

      lastPrice = price;

      result.innerHTML = `${input.toUpperCase()} = $${formatted}`;
      result.className = colorClass;

    } catch (err) {
      result.innerText = "⚠️ Error fetching price";
    }
  }

  fetchPrice(); // run immediately
  interval = setInterval(fetchPrice, 2000); // update every 2 seconds
}
</script>

</body>
</html>
