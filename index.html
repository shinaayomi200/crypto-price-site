<!DOCTYPE html>
<html>
<head>
  <title>Dynamic Crypto Dashboard</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input, button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input {
      width: 200px;
      margin-right: 10px;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .coin-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .coin-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      width: 180px;
      font-weight: bold;
      font-size: 16px;
      transition: transform 0.2s;
      text-align: center;
      position: relative;
    }

    .coin-card:hover {
      transform: scale(1.05);
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    .remove-btn {
      position: absolute;
      top: 5px;
      right: 8px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    canvas { margin-top: 10px; }
  </style>
</head>
<body>

<h2>🚀 Dynamic Crypto Dashboard</h2>

<input type="text" id="coinInput" placeholder="BTC or bitcoin">
<button onclick="addCoin()">Add Coin</button>

<div class="coin-container" id="dashboard"></div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let coins = [];
let lastPrices = {};
let charts = {};

const coinMap = {
  btc: "bitcoin",
  bitcoin: "bitcoin",
  eth: "ethereum",
  ethereum: "ethereum",
  sol: "solana",
  solana: "solana",
  doge: "dogecoin",
  dogecoin: "dogecoin",
  bnb: "binancecoin",
  binancecoin: "binancecoin",
  ada: "cardano",
  cardano: "cardano"
};

function addCoin() {
  const input = document.getElementById("coinInput").value.toLowerCase();
  const coinId = coinMap[input];
  if (!coinId) {
    alert("Unsupported coin!");
    return;
  }

  if (!coins.includes(coinId)) coins.push(coinId);

  if (!document.getElementById(coinId)) {
    const dashboard = document.getElementById("dashboard");
    const card = document.createElement("div");
    card.className = "coin-card";
    card.id = coinId;
    card.innerHTML = `
      <button class="remove-btn" onclick="removeCoin('${coinId}')">×</button>
      ${input.toUpperCase()}<br>Loading...<br>
      <span id="${coinId}-change"></span>
      <canvas id="${coinId}-chart" width="150" height="50"></canvas>
    `;
    dashboard.appendChild(card);

    const ctx = document.getElementById(`${coinId}-chart`).getContext('2d');
    charts[coinId] = new Chart(ctx, {
      type: 'line',
      data: { labels: [], datasets: [{ data: [], borderColor: '#38bdf8', borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
      options: { responsive: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
  }

  document.getElementById("coinInput").value = "";
  fetchPrices();
}

function removeCoin(coinId) {
  coins = coins.filter(c => c !== coinId);
  delete lastPrices[coinId];
  delete charts[coinId];
  const card = document.getElementById(coinId);
  if (card) card.remove();
}

async function fetchPrices() {
  if (coins.length === 0) return;
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.join(',')}&vs_currencies=usd&include_24hr_change=true`);
    const data = await res.json();

    coins.forEach(coinId => {
      const price = data[coinId].usd;
      const change = data[coinId].usd_24h_change;
      const formatted = price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const changeFormatted = change.toFixed(2) + "%";

      let colorClass = "";
      if (lastPrices[coinId] !== undefined) {
        colorClass = (price > lastPrices[coinId]) ? "green" : (price < lastPrices[coinId]) ? "red" : "";
      }
      lastPrices[coinId] = price;

      const card = document.getElementById(coinId);
      card.className = `coin-card ${colorClass}`;
      card.innerHTML = `
        <button class="remove-btn" onclick="removeCoin('${coinId}')">×</button>
        ${coinId.toUpperCase()}<br>$${formatted}<br>
        <span id="${coinId}-change" class="${change >= 0 ? 'green' : 'red'}">${changeFormatted}</span>
        <canvas id="${coinId}-chart" width="150" height="50"></canvas>
      `;

      const chart = charts[coinId];
      if (chart.data.labels.length >= 20) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }
      chart.data.labels.push("");
      chart.data.datasets[0].data.push(price);
      chart.update();
    });

  } catch (err) {
    console.log("Error fetching prices:", err);
  }
}

setInterval(fetchPrices, 3000);
</script>
</body>
</html>
