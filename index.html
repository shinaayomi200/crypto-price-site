
<!DOCTYPE html>
<html>
<head>
  <title>Crypto Tracker</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    h2 {
      color: #38bdf8;
    }

    input {
      padding: 12px;
      width: 200px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }
  </style>
</head>

<body>

<h2>🚀 Crypto Price Tracker</h2>

<input type="text" id="coin" placeholder="BTC, ETH, SOL...">
<button onclick="startTracking()">Start</button>

<p id="result">Enter a coin</p>

<script>
let interval;
let lastPrice = null;

const coinMap = {
  btc: "bitcoin",
  eth: "ethereum",
  sol: "solana",
  bnb: "binancecoin",
  ada: "cardano",
  doge: "dogecoin"
};

function startTracking() {
  const input = document.getElementById("coin").value.toLowerCase();
  const coin = coinMap[input];

  const result = document.getElementById("result");

  if (!coin) {
    result.innerText = "❌ Unsupported coin";
    return;
  }

  if (interval) clearInterval(interval);

  async function fetchPrice() {
    try {
      const res = await fetch(
        `https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd`
      );

      const data = await res.json();

      const price = data[coin].usd;
      const formatted = price.toLocaleString();

      let colorClass = "";
      if (lastPrice !== null) {
        if (price > lastPrice) colorClass = "green";
        else if (price < lastPrice) colorClass = "red";
      }

      lastPrice = price;

      result.innerHTML = `${input.toUpperCase()} = $${formatted}`;
      result.className = colorClass;

    } catch (err) {
      result.innerText = "⚠️ Network error";
    }
  }

  fetchPrice();
  interval = setInterval(fetchPrice, 3000); // every 3 seconds
}
</script>

</body>
</html>
